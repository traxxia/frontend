<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <style>
      /* Disable Google Translate tooltip and hover highlighting aggressively */
      .goog-te-banner-frame.skiptranslate, #goog-gt-tt { display: none !important; }
      .goog-tooltip, .goog-tooltip:hover { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }
      font, span.goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
      body { top: 0 !important; }
    </style>
    
    <meta
      name="description"
      content="Traxxia - Business Analysis Platform"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <title class="notranslate" translate="no">Traxxia</title>
    
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
    <div id="google_translate_element" style="display: none;"></div>
    <script type="text/javascript">
      try {
        var langStore = sessionStorage.getItem('language-storage');
        if (langStore) {
          var parsed = JSON.parse(langStore);
          var lang = parsed && parsed.state && parsed.state.currentLanguage;
          if (lang) {
            document.cookie = "googtrans=/auto/" + lang + "; path=/";
            document.cookie = "googtrans=/auto/" + lang + "; path=/; domain=" + location.hostname;
          }
        }
      } catch(e) {}

      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'es,en',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      .goog-te-banner-frame { display: none !important; }
      body { top: 0px !important; }
      .skiptranslate { display: none !important; }
    </style>
  </body>
</html>
