name: TRAXXIA Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: traxxia_frontend
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Install & Build
  # ─────────────────────────────────────────────
  build:
    name: Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate .env file
        working-directory: frontend
        run: |
          rm -f .env
          echo "REACT_APP_BACKEND_URL=${{ vars.REACT_APP_BACKEND_URL }}" >> .env
          echo "REACT_APP_ML_BACKEND_URL=${{ vars.REACT_APP_ML_BACKEND_URL }}" >> .env
          echo "REACT_APP_ENABLE_PMF=${{ vars.REACT_APP_ENABLE_PMF }}" >> .env
          echo "REACT_APP_AI_CHAT_URL=${{ vars.REACT_APP_AI_CHAT_URL }}" >> .env
          echo ".env generated successfully"

      - name: Build React app
        working-directory: frontend
        run: npm run build
        env:
          CI: false   # Prevents treating warnings as errors

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: Docker Build & Push (master only)
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set image version
        id: version
        run: echo "IMAGE_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Generate .env file
        working-directory: frontend
        run: |
          rm -f .env
          echo "REACT_APP_BACKEND_URL=${{ vars.REACT_APP_BACKEND_URL }}" >> .env
          echo "REACT_APP_ML_BACKEND_URL=${{ vars.REACT_APP_ML_BACKEND_URL }}" >> .env
          echo "REACT_APP_ENABLE_PMF=${{ vars.REACT_APP_ENABLE_PMF }}" >> .env
          echo "REACT_APP_AI_CHAT_URL=${{ vars.REACT_APP_AI_CHAT_URL }}" >> .env

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/docker/Dockerfile
          push: true  # ← Set to true once you uncomment a login step above
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/trax_dev_frontend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/trax_dev_frontend:${{ steps.version.outputs.IMAGE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "Image tagged as ${{ secrets.ACR_LOGIN_SERVER }}/trax_dev_frontend:${{ steps.version.outputs.IMAGE_VERSION }}"
