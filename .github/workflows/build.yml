name: TRAXXIA Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: traxxia_frontend
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  docker:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────
      # 1. Checkout
      # ─────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Set version
      # ─────────────────────────────
      - name: Set image version
        id: version
        run: echo "IMAGE_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ─────────────────────────────
      # 3. Debug variables (optional but useful)
      # ─────────────────────────────
      - name: Debug ENV
        run: |
          echo "BACKEND=$REACT_APP_BACKEND_URL"
          echo "ML=$REACT_APP_ML_BACKEND_URL"
        env:
          REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL }}
          REACT_APP_ML_BACKEND_URL: ${{ vars.REACT_APP_ML_BACKEND_URL }}

      # ─────────────────────────────
      # 4. Login to ACR
      # ─────────────────────────────
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ─────────────────────────────
      # 5. Setup Docker
      # ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────
      # 6. Build & Push (IMPORTANT FIXES HERE)
      # ─────────────────────────────
      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true

          # 🔥 IMPORTANT: disable cache (fix localhost issue)
          no-cache: true

          # 🔥 Pass GitHub variables directly
          build-args: |
            REACT_APP_BACKEND_URL=${{ vars.REACT_APP_BACKEND_URL }}
            REACT_APP_ML_BACKEND_URL=${{ vars.REACT_APP_ML_BACKEND_URL }}
            REACT_APP_ENABLE_PMF=${{ vars.REACT_APP_ENABLE_PMF }}
            REACT_APP_AI_CHAT_URL=${{ vars.REACT_APP_AI_CHAT_URL }}

          # Image tags
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.IMAGE_VERSION }}

      # ─────────────────────────────
      # 7. Output
      # ─────────────────────────────
      - name: Output image tag
        run: echo "Image pushed: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.IMAGE_VERSION }}"